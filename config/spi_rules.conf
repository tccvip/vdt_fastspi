# SPIFast Reference Rule Configuration
# Format defined in SDD §5.1  /  SRS RC-004
#
# Filter Group Declarations:
#   [group: <name>]  precedence=<1-999>  action=<FORWARD|DROP>
#
# Rule Entries (comma-separated):
#   <rule_name>, <group_name>, <protocol>, <src_ip_cond>, <dst_ip_cond>, <src_port_cond>, <dst_port_cond>
#
# IP conditions:   any | src_prefix=A.B.C.D/N | src_address=A.B.C.D
#                        dst_prefix=A.B.C.D/N | dst_address=A.B.C.D
# Port conditions: any | <port> | <lo>-<hi>
# Protocol:        tcp | udp | any

# ─── Filter Group Declarations ────────────────────────────────────────────────
[group: fg_l34_facebook]     precedence=100  action=FORWARD
[group: fg_l34_youtube]      precedence=101  action=FORWARD
[group: fg_l34_http_sdf1003] precedence=102  action=FORWARD
[group: fg_l34_dns_sdf1005]  precedence=104  action=FORWARD
[group: DEFAULT]             precedence=999  action=DROP

# ─── Rule Entries ─────────────────────────────────────────────────────────────
# Facebook — CIDR and exact-host examples
f_l34_facebook_1, fg_l34_facebook,      any, any, dst_prefix=31.13.64.0/18,  any, any
f_l34_facebook_4, fg_l34_facebook,      any, any, dst_address=69.220.144.5,  any, any

# YouTube — TCP port 443 to destination prefix / host
f_l34_youtube_1,  fg_l34_youtube,       tcp, any, dst_prefix=142.250.0.0/15, any, 443
f_l34_youtube_4,  fg_l34_youtube,       tcp, any, dst_address=74.125.0.1,    any, 443

# Generic HTTP
f_l34_http_all,   fg_l34_http_sdf1003,  tcp, any, any,                       any, 80

# DNS over UDP and TCP
f_l34_dns_udp,    fg_l34_dns_sdf1005,   udp, any, any,                       any, 53
f_l34_dns_tcp,    fg_l34_dns_sdf1005,   tcp, any, any,                       any, 53
