# SPIFast Reference Rule Configuration
# Format defined in SDD §5.1  /  SRS RC-004
#
# Filter Group Declarations:
#   [group: <name>]  precedence=<1-999>  action=<FORWARD|DROP>
#
# Rule Entries (comma-separated):
#   <rule_name>, <group_name>, <protocol>, <src_ip_cond>, <dst_ip_cond>, <src_port_cond>, <dst_port_cond>
#
# IP conditions:   any | src_prefix=A.B.C.D/N | src_address=A.B.C.D
#                        dst_prefix=A.B.C.D/N | dst_address=A.B.C.D
# Port conditions: any | <port> | <lo>-<hi>
# Protocol:        tcp | udp | any

